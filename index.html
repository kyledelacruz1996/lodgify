<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lodgify Properties</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #f7f7f7;
    }

    button {
      padding: 12px 20px;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .property {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    h2 {
      margin-top: 0;
    }

    .rooms {
      margin-top: 20px;
      padding: 15px;
      background: #f8f8f8;
      border-radius: 8px;
    }

    .room {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .room:last-child {
      border-bottom: none;
    }

    details {
      margin-top: 15px;
    }

    pre {
      background: #272822;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h1>Lodgify Property List</h1>

  <button id="loadProperties">
    Load Properties
  </button>

  <div id="properties"></div>

  <script src="script.js"></script>

</body>
</html>
